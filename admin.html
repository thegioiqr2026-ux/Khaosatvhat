<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý VHAT</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #cfd8dc; padding: 20px; text-align: center; }
        .admin-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 450px; margin: auto; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin-bottom: 5px; }
        .btn-blue { background: #01579b; } .btn-red { background: #b71c1c; } .btn-gray { background: #546e7a; }
    </style>
</head>
<body>
<div class="admin-card">
    <h2>QUẢN TRỊ HỆ THỐNG</h2>
    <div class="section">
        <label><b>Tạo phiên khảo sát mới:</b></label>
        <input type="text" id="factoryName" placeholder="Nhập tên nhà máy mới">
        <button class="btn-blue" onclick="setupNew()">TẠO MỚI (XÓA CŨ)</button>
    </div>
    <div class="section">
        <p id="info" style="font-weight:bold; color:#01579b;">Đang tải...</p>
        <button class="btn-gray" onclick="archive()">LƯU TRỮ LỊCH SỬ</button>
        <button class="btn-red" onclick="clearTemp()">XÓA TẠM DỮ LIỆU HIỆN TẠI</button>
    </div>
    <input type="password" id="adminPass" placeholder="Mật khẩu (123456)">
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE", authDomain: "qldd-2025.firebaseapp.com", databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com", projectId: "qldd-2025", storageBucket: "qldd-2025.firebasestorage.app", messagingSenderId: "84684010166", appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17", measurementId: "G-7E5BDTCSEZ" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('active_session/name').on('value', snap => { document.getElementById('info').innerText = "Hiện tại: " + (snap.val()||"N/A"); });

    function auth() { return document.getElementById('adminPass').value === "123456"; }

    function setupNew() {
        if(!auth()) return;
        const name = document.getElementById('factoryName').value;
        if(!name) return;
        db.ref('surveys').remove();
        db.ref('active_session').set({ name: name, time: Date.now() });
        alert("Đã mở phiên mới cho " + name);
    }

    function clearTemp() {
        if(!auth() || !confirm("Xóa tạm dữ liệu?")) return;
        db.ref('surveys').remove();
        alert("Đã làm sạch dữ liệu hiện tại.");
    }

    function archive() {
        if(!auth()) return;
        db.ref('surveys').once('value', snap => {
            if(!snap.val()) return alert("Không có dữ liệu!");
            db.ref('active_session/name').once('value', n => {
                db.ref('archives').push({ factory: n.val(), data: snap.val(), time: Date.now() });
                alert("Đã lưu vào kho lưu trữ.");
            });
        });
    }
</script>
</body>
</html>
