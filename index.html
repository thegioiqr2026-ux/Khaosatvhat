<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo sát Văn hóa An toàn</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 10px; }
        .card { background: white; max-width: 600px; margin: 20px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; font-size: 20px; text-transform: uppercase; line-height: 1.4; }
        .question { margin-top: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .question p { font-weight: bold; margin-bottom: 10px; font-size: 15px; color: #37474f; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #01579b; font-size: 16px; background: #fff; }
        .btn { background: #01579b; color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 25px; font-weight: bold; }
        @media (max-width: 480px) { h2 { font-size: 17px; } .card { padding: 15px; } }
    </style>
</head>
<body>
<div class="card">
    <h2 id="factory-title">ĐANG TẢI...</h2>
    <form id="vhatForm">
        <div class="question"><p>1. Lãnh đạo ưu tiên an toàn hơn tiến độ?</p>
            <select name="q1"><option value="1">1: Rất kém</option><option value="2">2: Kém</option><option value="3">3: Trung bình</option><option value="4">4: Tốt</option><option value="5" selected>5: Rất tốt</option></select></div>
        <div class="question"><p>2. Bạn sẵn sàng báo cáo sự cố "Suýt chết"?</p>
            <select name="q2"><option value="1">1: Rất kém</option><option value="3">3: Trung bình</option><option value="5" selected>5: Rất tốt</option></select></div>
        <div class="question"><p>3. Bạn thực hiện nghiêm quy trình LOTO/PTW?</p>
            <select name="q3"><option value="1">1: Rất kém</option><option value="3">3: Trung bình</option><option value="5" selected>5: Rất tốt</option></select></div>
        <div class="question"><p>4. Môi trường Bụi/Ồn/Nhiệt được kiểm soát tốt?</p>
            <select name="q4"><option value="1">1: Rất kém</option><option value="3">3: Trung bình</option><option value="5" selected>5: Rất tốt</option></select></div>
        <div class="question"><p>5. Nội dung huấn luyện sát với thực tế?</p>
            <select name="q5"><option value="1">1: Rất kém</option><option value="3">3: Trung bình</option><option value="5" selected>5: Rất tốt</option></select></div>
        <button type="button" class="btn" onclick="sendData()">GỬI ĐÁNH GIÁ</button>
    </form>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('active_session/name').on('value', snap => {
        document.getElementById('factory-title').innerText = "KHẢO SÁT VĂN HÓA AN TOÀN - " + (snap.val() || "NHÀ MÁY").toUpperCase();
    });

    function sendData() {
        const data = {
            q1: parseInt(document.getElementsByName("q1")[0].value),
            q2: parseInt(document.getElementsByName("q2")[0].value),
            q3: parseInt(document.getElementsByName("q3")[0].value),
            q4: parseInt(document.getElementsByName("q4")[0].value),
            q5: parseInt(document.getElementsByName("q5")[0].value),
            timestamp: Date.now()
        };
        db.ref('surveys').push(data).then(() => { window.location.href = "dashboard.html"; });
    }
</script>
</body>
</html>
