<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #cfd8dc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 90%; }
        input[type="password"] { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .btn-delete { background: #b71c1c; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="admin-card">
    <h2>ADMIN QUẢN TRỊ</h2>
    <input type="password" id="adminPass" placeholder="Mật khẩu (123456)">
    <button class="btn-delete" onclick="clearData()">XÓA HẾT DỮ LIỆU CŨ</button>
    <div id="message"></div>
    <p><a href="dashboard.html" style="color:#01579b; text-decoration:none;">← Quay lại Dashboard</a></p>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    function clearData() {
        if (document.getElementById('adminPass').value === "123456") {
            if (confirm("Xác nhận xóa vĩnh viễn dữ liệu?")) {
                database.ref('surveys').remove().then(() => {
                    document.getElementById('message').innerText = "Đã làm sạch dữ liệu!";
                    document.getElementById('message').style.color = "green";
                });
            }
        } else { alert("Mật khẩu sai!"); }
    }
</script>
</body>
</html>
