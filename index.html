<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo sát Văn hóa An toàn - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eceff1; margin: 0; padding: 10px; color: #333; }
        .card { background: white; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; font-size: 22px; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #546e7a; margin-bottom: 20px; font-size: 14px; }
        .question { margin-top: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .question p { font-weight: bold; margin-bottom: 10px; font-size: 15px; line-height: 1.4; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background: #f9f9f9; appearance: none; }
        .btn { background: #01579b; color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 25px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #0277bd; }
        
        /* Mobile Optimization */
        @media (max-width: 480px) {
            .card { padding: 15px; margin: 5px auto; border-radius: 8px; }
            h2 { font-size: 18px; }
            .question p { font-size: 14px; }
            select { font-size: 15px; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>KHẢO SÁT VĂN HÓA AN TOÀN</h2>
    <p class="sub-title">Nhà máy Nhiệt điện Vĩnh Tân 2 (Mô hình 5 trục)</p>
    
    <form id="vhatForm">
        <div class="question"><p>1. Lãnh đạo ưu tiên an toàn hơn tiến độ?</p>
            <select name="q1"><option value="2">2 (Rất kém)</option><option value="4">4 (Trung bình)</option><option value="6">6 (Khá)</option><option value="8">8 (Tốt)</option><option value="10" selected>10 (Rất tốt)</option></select></div>
        <div class="question"><p>2. Bạn sẵn sàng báo cáo sự cố "Suýt chết"?</p>
            <select name="q2"><option value="2">2 (Không)</option><option value="6">6 (Đôi khi)</option><option value="10" selected>10 (Sẵn sàng)</option></select></div>
        <div class="question"><p>3. Bạn thực hiện nghiêm quy trình LOTO/PTW?</p>
            <select name="q3"><option value="2">2 (Đối phó)</option><option value="6">6 (Cơ bản)</option><option value="10" selected>10 (Tuyệt đối)</option></select></div>
        <div class="question"><p>4. Môi trường Bụi/Ồn/Nhiệt được kiểm soát tốt?</p>
            <select name="q4"><option value="2">2 (Tệ)</option><option value="6">6 (Khá)</option><option value="10" selected>10 (Rất tốt)</option></select></div>
        <div class="question"><p>5. Nội dung huấn luyện sát với thực tế?</p>
            <select name="q5"><option value="2">2 (Lý thuyết)</option><option value="6">6 (Bình thường)</option><option value="10" selected>10 (Rất thực tế)</option></select></div>
        <button type="button" class="btn" onclick="sendData()">GỬI KẾT QUẢ</button>
    </form>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function sendData() {
        const data = {
            q1: parseInt(document.getElementsByName("q1")[0].value),
            q2: parseInt(document.getElementsByName("q2")[0].value),
            q3: parseInt(document.getElementsByName("q3")[0].value),
            q4: parseInt(document.getElementsByName("q4")[0].value),
            q5: parseInt(document.getElementsByName("q5")[0].value),
            timestamp: Date.now()
        };
        database.ref('surveys').push(data).then(() => { window.location.href = "dashboard.html"; });
    }
</script>
</body>
</html>
