<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VHAT - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 10px; }
        .card { background: white; max-width: 850px; margin: 10px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; font-size: 20px; text-transform: uppercase; margin-bottom: 20px; }
        #chart-wrap { position: relative; height: 350px; width: 100%; margin: auto; }
        #evaluation-box { margin-top: 25px; padding: 20px; border-radius: 8px; background: #fff; border: 1px solid #e0e0e0; }
        .eval-header { color: #01579b; font-weight: bold; font-size: 17px; border-bottom: 2px solid #01579b; padding-bottom: 10px; margin-bottom: 15px; display: block; }
        .issue-item { margin-bottom: 15px; padding: 10px; border-radius: 6px; background: #fff5f5; border-left: 4px solid #f44336; }
        .issue-title { font-weight: bold; color: #d32f2f; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 13px; }
        .issue-desc { font-size: 14px; color: #37474f; line-height: 1.5; margin: 0; }
        .solution-text { font-style: italic; color: #1b5e20; display: block; margin-top: 5px; font-weight: 500; }
        .btn-back { display: block; width: 160px; margin: 25px auto 0; padding: 12px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
        @media (max-width: 480px) { #chart-wrap { height: 300px; } h2 { font-size: 16px; } }
    </style>
</head>
<body>

<div class="card">
    <h2 id="factory-dash">ĐANG TẢI...</h2>
    <div id="chart-wrap"><canvas id="radarChart"></canvas></div>
    
    <div id="evaluation-box">
        <span class="eval-header">⚡ PHÂN TÍCH CHUYÊN SÂU & HÀNH ĐỘNG KHẮC PHỤC</span>
        <div id="evaluation-content">Đang phân tích dữ liệu từ Firebase...</div>
    </div>
    
    <a href="index.html" class="btn-back">QUAY LẠI KHẢO SÁT</a>
</div>

<script>
    // Firebase Config (Giữ nguyên của bạn)
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('active_session/name').on('value', snap => {
        document.getElementById('factory-dash').innerText = "DASHBOARD AN TOÀN - " + (snap.val() || "NHÀ MÁY").toUpperCase();
    });

    const ctx = document.getElementById('radarChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'],
            datasets: [{
                label: 'Điểm trung bình (1-5)',
                data: [0,0,0,0,0],
                backgroundColor: 'rgba(1, 87, 155, 0.2)', borderColor: '#01579b', borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#01579b'
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { r: { min: 0, max: 5, ticks: { display: false, stepSize: 1 } } },
            plugins: { legend: { display: false } }
        }
    });

    // Thư viện giải pháp chi tiết
    const solutionLibrary = {
        0: { name: "Cam kết Lãnh đạo", issue: "Người lao động cảm thấy áp lực tiến độ đang lấn át các tiêu chuẩn an toàn.", action: "Tổ chức đối thoại Safety Talk trực tiếp tại hiện trường định kỳ. BGĐ cần thực hiện phê duyệt dừng máy ngay khi phát hiện rủi ro loại A mà không xử phạt đơn vị vận hành." },
        1: { name: "Văn hóa Báo cáo", issue: "Tâm lý sợ bị kỷ luật hoặc phiền hà khiến các sự cố Near-miss bị che giấu.", action: "Số hóa quy trình báo cáo qua mã QR ẩn danh. Thiết lập quỹ khen thưởng tháng cho các cá nhân phát hiện 'mối nguy tiềm ẩn' thay vì chỉ tập trung vào xử phạt sai phạm." },
        2: { name: "Tính Tuân thủ", issue: "Tình trạng làm tắt, bỏ qua bước LOTO hoặc không sử dụng đúng PPE vẫn diễn ra.", action: "Tăng cường kiểm tra hiện trường đột xuất (Site Check) vào các khung giờ bàn giao ca. Áp dụng Thẻ phạt An toàn (Safety Card) và yêu cầu tái huấn luyện ngay tại chỗ đối với vi phạm nghiêm trọng." },
        3: { name: "Môi trường làm việc", issue: "Các yếu tố vật lý như bụi than, tiếng ồn hoặc nhiệt độ gian máy vượt ngưỡng cảm nhận an toàn.", action: "Rà soát lại hệ thống thông gió và bọc cách nhiệt đường ống bao hơi. Cung cấp PPE chuyên dụng (nút tai chống ồn cao cấp, khẩu trang lọc bụi mịn) và định kỳ đo kiểm môi trường lao động." },
        4: { name: "Đào tạo & Huấn luyện", issue: "Nội dung huấn luyện còn nặng tính lý thuyết, chưa sát với các tình huống khẩn cấp thực tế.", action: "Xây dựng các video mô phỏng sự cố thực tế tại Vĩnh Tân 2. Ứng dụng Gamification (trò chơi hóa) vào sát hạch an toàn và thực hành diễn tập phương án cứu hộ trong không gian hạn chế." }
    };

    database.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        const contentDiv = document.getElementById('evaluation-content');
        if (!data) { contentDiv.innerHTML = "Chưa có dữ liệu khảo sát cho phiên này."; return; }
        
        let sums = [0,0,0,0,0], count = 0;
        for (let k in data) {
            sums[0]+=data[k].q1; sums[1]+=data[k].q2; sums[2]+=data[k].q3; sums[3]+=data[k].q4; sums[4]+=data[k].q5;
            count++;
        }
        
        const avgs = sums.map(s => parseFloat((s/count).toFixed(1)));
        myChart.data.datasets[0].data = avgs;
        myChart.update();

        // Thuật toán phân tích tất cả các trục dưới 3.5 điểm
        let htmlContent = `<p style='font-size:14px; margin-bottom:15px;'>Tổng hợp từ <b>${count}</b> lượt khảo sát. Hệ thống ghi nhận các vấn đề sau:</p>`;
        let hasIssue = false;

        avgs.forEach((val, index) => {
            if (val < 3.5) { // Ngưỡng đánh giá có vấn đề
                hasIssue = true;
                const info = solutionLibrary[index];
                htmlContent += `
                    <div class="issue-item">
                        <span class="issue-title">${info.name} (${val}/5)</span>
                        <p class="issue-desc"><b>Hiện trạng:</b> ${info.issue}</p>
                        <span class="solution-text"><b>🎯 Giải pháp:</b> ${info.action}</span>
                    </div>
                `;
            }
        });

        if (!hasIssue) {
            htmlContent = `<p style='color:#2e7d32; font-weight:bold;'>✅ Tuyệt vời! Tất cả các trục chỉ số đều đạt ngưỡng an toàn tốt. Hãy tiếp tục duy trì và cải tiến liên tục.</p>`;
        }

        contentDiv.innerHTML = htmlContent;
    });
</script>
</body>
</html>
