<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard VHAT 5 Trục - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; padding: 20px; }
        .card { background: white; max-width: 850px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; }
        #evaluation-box { margin-top: 25px; padding: 20px; border-radius: 8px; background: #f1f8ff; border-left: 6px solid #01579b; }
        .solution { color: #d32f2f; font-weight: bold; margin-top: 10px; white-space: pre-wrap; }
        .btn-back { display: block; width: 180px; margin: 25px auto 0; padding: 10px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỈ SỐ VĂN HÓA AN TOÀN TỔNG HỢP (5 TRỤC - THANG 10)</h2>
    <canvas id="radarChart"></canvas>
    
    <div id="evaluation-box">
        <h3 style="color: #01579b; margin-top: 0;">⚡ Phân tích & Giải pháp</h3>
        <p id="status-text">Đang tổng hợp dữ liệu...</p>
        <div id="solution-text" class="solution"></div>
    </div>
    <a href="index.html" class="btn-back">Quay lại Khảo sát</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const ctx = document.getElementById('radarChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'],
            datasets: [{
                label: 'Điểm trung bình thực tế',
                data: [0, 0, 0, 0, 0],
                backgroundColor: 'rgba(1, 87, 155, 0.2)', borderColor: '#01579b', borderWidth: 3
            }]
        },
        options: { scales: { r: { min: 0, max: 10, ticks: { stepSize: 2 } } } }
    });

    database.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        let sums = [0,0,0,0,0], count = 0;
        for (let k in data) {
            sums[0]+=data[k].q1; sums[1]+=data[k].q2; sums[2]+=data[k].q3; sums[3]+=data[k].q4; sums[4]+=data[k].q5;
            count++;
        }
        if (count > 0) {
            const avgs = sums.map(s => (s/count).toFixed(1));
            myChart.data.datasets[0].data = avgs;
            myChart.update();

            let minVal = Math.min(...avgs);
            let minIndex = avgs.indexOf(minVal.toString());
            let status = `Tổng hợp ${count} lượt khảo sát. Điểm thấp nhất tại trục: ${myChart.data.labels[minIndex]} (${minVal}/10).`;
            let solutions = [
                "👉 Giải pháp: Lãnh đạo cần thực hiện Safety Walk định kỳ để thu hẹp khoảng cách với hiện trường.",
                "👉 Giải pháp: Áp dụng chính sách 'Không đổ lỗi' để khuyến khích báo cáo sự cố suýt chết.",
                "👉 Giải pháp: Siết chặt quy trình LOTO và tăng cường giám sát hiện trường đột xuất.",
                "👉 Giải pháp: Rà soát lại hệ thống lọc bụi tĩnh điện và bảo ôn đường ống lò hơi.",
                "👉 Giải pháp: Số hóa nội dung huấn luyện, tăng tính tương tác qua mã QR và mô phỏng thực tế."
            ];
            document.getElementById('status-text').innerText = status;
            document.getElementById('solution-text').innerText = solutions[minIndex];
        }
    });
</script>
</body>
</html>
