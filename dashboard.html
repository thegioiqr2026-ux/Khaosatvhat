<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Văn hóa An toàn - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; padding: 20px; }
        .card { background: white; max-width: 800px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; }
        #evaluation-box { margin-top: 30px; padding: 20px; border-radius: 8px; background: #f1f8ff; border-left: 6px solid #01579b; }
        .solution { color: #d32f2f; font-weight: bold; margin-top: 10px; line-height: 1.5; }
        .btn-back { display: block; width: 200px; margin: 30px auto 10px; padding: 12px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { background: #37474f; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỈ SỐ VĂN HÓA AN TOÀN TỔNG HỢP (THANG 10)</h2>
    <canvas id="radarChart"></canvas>
    
    <div id="evaluation-box">
        <h3 style="color: #01579b; margin-top: 0;">⚡ Đánh giá & Đề xuất giải pháp</h3>
        <p id="status-text">Đang phân tích dữ liệu...</p>
        <div id="solution-text" class="solution"></div>
    </div>

    <a href="index.html" class="btn-back"> Quay lại trang đánh giá</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const ctx = document.getElementById('radarChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Lãnh đạo', 'Văn hóa Báo cáo', 'Tính Tuân thủ', 'Môi trường', 'Đào tạo'],
            datasets: [{
                label: 'Điểm trung bình toàn nhà máy',
                data: [0, 0, 0, 0, 0],
                backgroundColor: 'rgba(1, 87, 155, 0.2)',
                borderColor: '#01579b',
                pointBackgroundColor: '#01579b',
                borderWidth: 3
            }]
        },
        options: { 
            scales: { 
                r: { 
                    min: 0, 
                    max: 10, 
                    ticks: { stepSize: 2, font: { size: 12 } },
                    pointLabels: { font: { size: 14, weight: 'bold' } }
                } 
            } 
        }
    });

    database.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        let sumQ1 = 0, sumQ2 = 0, sumQ3 = 0, count = 0;
        
        for (let key in data) {
            sumQ1 += data[key].lanhDao;
            sumQ2 += data[key].baoCao;
            sumQ3 += data[key].tuanThu;
            count++;
        }

        if (count > 0) {
            const avg1 = (sumQ1/count).toFixed(1);
            const avg2 = (sumQ2/count).toFixed(1);
            const avg3 = (sumQ3/count).toFixed(1);

            myChart.data.datasets[0].data = [avg1, avg2, avg3, 8.2, 7.5];
            myChart.update();

            let status = `Hiện có ${count} lượt đánh giá. `;
            let solution = "";

            if (avg2 < 7) {
                status += "Tình trạng: Văn hóa báo cáo chưa thực sự cởi mở.";
                solution = "👉 Giải pháp: Mr. An Toàn kiến nghị áp dụng chính sách 'Khen thưởng nóng' cho các báo cáo Near-miss để loại bỏ tâm lý e ngại bị kỷ luật.";
            } else if (avg3 < 7) {
                status += "Tình trạng: Tính tuân thủ tại hiện trường cần được chấn chỉnh.";
                solution = "👉 Giải pháp: Tăng cường kiểm tra đột xuất quy trình LOTO và trang bị BHLĐ của các nhà thầu phụ tại khu vực lò hơi.";
            } else if (avg1 < 7) {
                status += "Tình trạng: Cam kết an toàn từ cấp quản lý chưa chạm đến người lao động.";
                solution = "👉 Giải pháp: Đề xuất Ban Giám đốc tổ chức các buổi 'Safety Walk' định kỳ hàng tuần để trực tiếp tháo gỡ khó khăn về an toàn cho anh em vận hành.";
            } else {
                status += "Tình trạng: Văn hóa an toàn đang phát triển rất tích cực.";
                solution = "✅ Giải pháp: Tiếp tục duy trì và số hóa các quy trình cấp phép làm việc trên hệ thống phần mềm quản lý.";
            }

            document.getElementById('status-text').innerText = status;
            document.getElementById('solution-text').innerText = solution;
        }
    });
</script>
</body>
</html>
