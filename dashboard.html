<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VHAT 5 Trục - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; padding: 20px; }
        .card { background: white; max-width: 850px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; margin-bottom: 20px; }
        #chart-container { position: relative; height: 400px; width: 100%; }
        #evaluation-box { margin-top: 25px; padding: 20px; border-radius: 8px; background: #f1f8ff; border-left: 6px solid #01579b; }
        .solution { color: #d32f2f; font-weight: bold; margin-top: 10px; }
        .btn-back { display: block; width: 180px; margin: 25px auto 0; padding: 10px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỈ SỐ VĂN HÓA AN TOÀN TỔNG HỢP (5 TRỤC)</h2>
    
    <div id="chart-container">
        <canvas id="radarChart"></canvas>
    </div>
    
    <div id="evaluation-box">
        <h3 style="color: #01579b; margin-top: 0;">⚡ Phân tích & Giải pháp</h3>
        <p id="status-text">Đang kết nối Firebase...</p>
        <div id="solution-text" class="solution"></div>
    </div>
    <a href="index.html" class="btn-back">Quay lại Khảo sát</a>
</div>

<script>
    // 1. Cấu hình Firebase của bạn
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };

    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Khởi tạo biểu đồ trước (với dữ liệu bằng 0)
    const ctx = document.getElementById('radarChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'],
            datasets: [{
                label: 'Điểm trung bình (Thang 10)',
                data: [0, 0, 0, 0, 0],
                backgroundColor: 'rgba(1, 87, 155, 0.2)',
                borderColor: '#01579b',
                borderWidth: 3,
                pointBackgroundColor: '#01579b'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    min: 0,
                    max: 10,
                    ticks: { stepSize: 2 }
                }
            }
        }
    });

    // 3. Lắng nghe dữ liệu từ Firebase
    database.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            document.getElementById('status-text').innerText = "Chưa có dữ liệu khảo sát. Hãy thực hiện đánh giá đầu tiên!";
            return;
        }

        let sums = [0, 0, 0, 0, 0], count = 0;
        
        for (let k in data) {
            // Kiểm tra tính tồn tại của các câu hỏi trong database
            sums[0] += (data[k].q1 || 0);
            sums[1] += (data[k].q2 || 0);
            sums[2] += (data[k].q3 || 0);
            sums[3] += (data[k].q4 || 0);
            sums[4] += (data[k].q5 || 0);
            count++;
        }

        if (count > 0) {
            const avgs = sums.map(s => (s/count).toFixed(1));
            
            // Cập nhật biểu đồ
            myChart.data.datasets[0].data = avgs;
            myChart.update();

            // Phân tích logic
            let minVal = Math.min(...avgs);
            let minIndex = avgs.indexOf(minVal.toString());
            let labels = ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'];
            
            document.getElementById('status-text').innerText = `Tổng cộng: ${count} phiếu. Thấp nhất: ${labels[minIndex]} (${minVal}/10).`;
            
            const solutions = [
                "👉 Giải pháp: Lãnh đạo cần Safety Walk thực tế hơn.",
                "👉 Giải pháp: Khuyến khích báo cáo Near-miss không kỷ luật.",
                "👉 Giải pháp: Siết chặt quy trình LOTO/PTW.",
                "👉 Giải pháp: Kiểm soát bụi và tiếng ồn gian máy.",
                "👉 Giải pháp: Cải tiến bài giảng sát thực tế hiện trường."
            ];
            document.getElementById('solution-text').innerText = solutions[minIndex];
        }
    }, (error) => {
        console.error("Lỗi kết nối Firebase:", error);
        document.getElementById('status-text').innerText = "Lỗi kết nối Firebase. Vui lòng kiểm tra Rules!";
    });
</script>
</body>
</html>
