<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Văn hóa An toàn</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #eceff1; padding: 20px; }
        .card { background: white; max-width: 800px; margin: auto; padding: 20px; border-radius: 12px; }
        h2 { color: #01579b; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỈ SỐ VĂN HÓA AN TOÀN TỔNG HỢP</h2>
    <canvas id="radarChart"></canvas>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const ctx = document.getElementById('radarChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Cam kết Lãnh đạo', 'Văn hóa Báo cáo', 'Tính Tuân thủ', 'Môi trường làm việc', 'Đào tạo'],
            datasets: [{
                label: 'Điểm trung bình toàn nhà máy',
                data: [0, 0, 0, 0, 0],
                backgroundColor: 'rgba(1, 87, 155, 0.2)',
                borderColor: '#01579b',
                pointBackgroundColor: '#01579b'
            }]
        },
        options: { scales: { r: { min: 0, max: 5 } } }
    });

    database.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        let sumQ1 = 0, sumQ2 = 0, sumQ3 = 0, count = 0;
        
        for (let key in data) {
            sumQ1 += data[key].lanhDao;
            sumQ2 += data[key].baoCao;
            sumQ3 += data[key].tuanThu;
            count++;
        }

        if (count > 0) {
            myChart.data.datasets[0].data = [
                sumQ1/count, 
                sumQ2/count, 
                sumQ3/count, 
                4.2, 3.8 // Điểm giả lập cho 2 trục còn lại
            ];
            myChart.update();
        }
    });
</script>
</body>
</html>
