<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VHAT</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 10px; }
        .card { background: white; max-width: 850px; margin: 10px auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        #chart-wrap { position: relative; height: 350px; width: 100%; }
        #evaluation-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #f1f8ff; border-left: 6px solid #01579b; }
        .solution { color: #d32f2f; font-weight: bold; margin-top: 10px; font-size: 14px; line-height: 1.5; }
        .btn-back { display: block; width: 160px; margin: 20px auto 0; padding: 10px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2 id="factory-dash">ĐANG TẢI...</h2>
    <div id="chart-wrap"><canvas id="radarChart"></canvas></div>
    <div id="evaluation-box">
        <p id="status-text" style="margin:0; font-size:14px; font-weight:bold;"></p>
        <div id="solution-text" class="solution"></div>
    </div>
    <a href="index.html" class="btn-back">QUAY LẠI KHẢO SÁT</a>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('active_session/name').on('value', snap => {
        document.getElementById('factory-dash').innerText = "DASHBOARD AN TOÀN - " + (snap.val() || "NHÀ MÁY").toUpperCase();
    });

    let myChart = null;
    function renderChart(dataPoints) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (myChart) { myChart.data.datasets[0].data = dataPoints; myChart.update(); return; }
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'],
                datasets: [{ label: 'Điểm (1-5)', data: dataPoints, backgroundColor: 'rgba(1, 87, 155, 0.2)', borderColor: '#01579b', borderWidth: 3 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 5, ticks: { display: false, stepSize: 1 } } } }
        });
    }

    db.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) { document.getElementById('status-text').innerText = "Chưa có dữ liệu."; renderChart([0,0,0,0,0]); return; }
        let sums = [0,0,0,0,0], count = 0;
        for (let k in data) {
            sums[0]+=(data[k].q1||0); sums[1]+=(data[k].q2||0); sums[2]+=(data[k].q3||0); sums[3]+=(data[k].q4||0); sums[4]+=(data[k].q5||0);
            count++;
        }
        const avgs = sums.map(s => parseFloat((s/count).toFixed(1)));
        renderChart(avgs);
        let minVal = Math.min(...avgs);
        let minIndex = avgs.indexOf(minVal);
        const solutions = [
            "Đề xuất Ban Giám đốc tăng cường Safety Walk.",
            "Khuyến khích báo cáo Near-miss (Không đổ lỗi).",
            "Siết chặt quy trình LOTO/PTW hiện trường.",
            "Kiểm soát bụi, ồn và bảo ôn thiết bị gian máy.",
            "Cải tiến bài giảng bằng video và ứng dụng số."
        ];
        document.getElementById('status-text').innerText = `Dữ liệu: ${count} phiếu. Thấp nhất: ${avgs[minIndex]}/5.`;
        document.getElementById('solution-text').innerText = "👉 Giải pháp: " + solutions[minIndex];
    });
</script>
</body>
</html>
