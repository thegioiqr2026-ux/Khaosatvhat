<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VHAT - Vĩnh Tân 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 10px; }
        .card { background: white; max-width: 800px; margin: 10px auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; font-size: 20px; margin-bottom: 15px; }
        #chart-wrap { position: relative; height: 350px; width: 100%; margin-bottom: 20px; }
        #evaluation-box { padding: 15px; border-radius: 8px; background: #f1f8ff; border-left: 6px solid #01579b; font-size: 14px; }
        .solution { color: #d32f2f; font-weight: bold; margin-top: 8px; display: block; }
        .btn-back { display: block; width: 160px; margin: 20px auto 0; padding: 10px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
        
        @media (max-width: 480px) {
            #chart-wrap { height: 300px; }
            h2 { font-size: 16px; }
            #evaluation-box { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỈ SỐ VĂN HÓA AN TOÀN (5 TRỤC)</h2>
    <div id="chart-wrap"><canvas id="radarChart"></canvas></div>
    <div id="evaluation-box">
        <p id="status-text" style="margin:0;">Đang kết nối dữ liệu...</p>
        <span id="solution-text" class="solution"></span>
    </div>
    <a href="index.html" class="btn-back">Quay lại khảo sát</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const ctx = document.getElementById('radarChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'],
            datasets: [{
                label: 'Điểm trung bình (0-10)',
                data: [0,0,0,0,0],
                backgroundColor: 'rgba(1, 87, 155, 0.2)', borderColor: '#01579b', borderWidth: 2, pointRadius: 3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { r: { min: 0, max: 10, ticks: { display: false, stepSize: 2 } } },
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } }
        }
    });

    database.ref('surveys').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) { document.getElementById('status-text').innerText = "Chưa có dữ liệu khảo sát."; return; }
        let sums = [0,0,0,0,0], count = 0;
        for (let k in data) {
            sums[0]+=data[k].q1; sums[1]+=data[k].q2; sums[2]+=data[k].q3; sums[3]+=data[k].q4; sums[4]+=data[k].q5;
            count++;
        }
        const avgs = sums.map(s => (s/count).toFixed(1));
        myChart.data.datasets[0].data = avgs;
        myChart.update();

        let minVal = Math.min(...avgs);
        let minIndex = avgs.indexOf(minVal.toString());
        let labels = ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'];
        document.getElementById('status-text').innerText = `Tổng số: ${count} phiếu. Thấp nhất: ${labels[minIndex]} (${minVal}/10).`;
        const solutions = ["Cần Safety Walk thực tế hơn.","Khuyến khích báo cáo Near-miss.","Siết chặt quy trình LOTO.","Kiểm soát bụi/ồn gian máy.","Cải tiến bài giảng sát thực tế."];
        document.getElementById('solution-text').innerText = "👉 Giải pháp: " + solutions[minIndex];
    });
</script>
</body>
</html>
